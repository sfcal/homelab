---
# --- App Registry ---
# Central definition of all data-driven app deployments.
# Each entry is consumed by the generic deploy-app.yml playbook.
# Compose templates reference values via apps[app_name].<field>.
# Secrets remain in per-app group_vars/<group>/secrets.sops.yml.
#
# Required fields:
#   host_group: inventory group name (e.g., app_cyberchef)
#   image: primary container image
#   images: list of all images to pre-pull
#
# Optional fields:
#   nfs: true — run nfs_mount role before deployment
#   user: override service file owner (default: root)
#   group: override service file group (default: root)

apps:
  birdle:
    host_group: app_birdle
    # renovate: datasource=docker
    image: "ghcr.io/sfcal/new-birdle:latest"
    port: 8091
    images:
      - "ghcr.io/sfcal/new-birdle:latest"

  games-server:
    host_group: app_gamesserver
    images: []
    terraria:
      # renovate: datasource=docker
      image: "ryshe/terraria:latest"
      port: 7777
      maxplayers: 8
      worldname: "TerrariaWorld"
      worldsize: 3
      difficulty: 0
      motd: "Welcome to the Terraria server!"
      language: "en-US"
      npcstream: 60
      seed: ""

  kasm:
    host_group: app_kasm
    # renovate: datasource=docker
    image: "lscr.io/linuxserver/kasm:1.18.0"
    port: 4443
    wizard_port: 3001
    images:
      - "lscr.io/linuxserver/kasm:1.18.0"

  openbooks:
    host_group: app_openbooks
    # renovate: datasource=docker
    image: "evanbuss/openbooks:latest"
    port: 8072
    images:
      - "evanbuss/openbooks:latest"

  restreamer:
    host_group: app_restreamer
    # renovate: datasource=docker
    image: "datarhei/restreamer:latest"
    port: 8710
    rtmp_port: 1935
    srt_port: 6000
    images:
      - "datarhei/restreamer:latest"

  seafile:
    host_group: app_seafile
    nfs: true
    # renovate: datasource=docker
    image: "seafileltd/seafile-mc:13.0-latest"
    # renovate: datasource=docker
    db_image: "mariadb:12.2"
    # renovate: datasource=docker
    redis_image: "redis:7"
    port: 8080
    hostname: "files.wil.5am.cloud"
    images:
      - "seafileltd/seafile-mc:13.0-latest"
      - "mariadb:12.2"
      - "redis:7"

  subsearch:
    host_group: app_subsearch
    nfs: true
    # renovate: datasource=docker
    image: "getmeili/meilisearch:v1.41"
    # renovate: datasource=docker
    indexer_image: "ghcr.io/sfcal/subtitle-fts:latest"
    port: 7700
    index_interval: "21600"
    images:
      - "getmeili/meilisearch:v1.13"
      - "ghcr.io/sfcal/subtitle-fts:latest"

  website:
    host_group: app_website
    # renovate: datasource=docker
    image: "ghcr.io/sfcal/samuel.computer:latest"
    port: 8090
    images:
      - "ghcr.io/sfcal/samuel.computer:latest"
