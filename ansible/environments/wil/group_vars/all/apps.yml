---
# --- App Registry ---
# Central definition of all data-driven app deployments.
# Each entry is consumed by the generic deploy-app.yml playbook.
# Compose templates reference values via apps[app_name].<field>.
# Secrets remain in per-app group_vars/<group>/secrets.sops.yml.
#
# Required fields:
#   host_group: inventory group name (e.g., app_cyberchef)
#   image: primary container image
#   images: list of all images to pre-pull
#
# Optional fields:
#   nfs: true — run nfs_mount role before deployment
#   user: override service file owner (default: root)
#   group: override service file group (default: root)

apps:
  birdle:
    host_group: app_birdle
    image: "ghcr.io/sfcal/new-birdle:latest"
    port: 8091
    images:
      - "ghcr.io/sfcal/new-birdle:latest"

  bookstack:
    host_group: app_bookstack
    image: "lscr.io/linuxserver/bookstack:latest"
    db_image: "lscr.io/linuxserver/mariadb:latest"
    port: 8074
    app_url: "https://bookstack.wil.5am.cloud"
    images:
      - "lscr.io/linuxserver/bookstack:latest"
      - "lscr.io/linuxserver/mariadb:latest"

  convertx:
    host_group: app_convertx
    image: "ghcr.io/c4illin/convertx:latest"
    port: 3100
    images:
      - "ghcr.io/c4illin/convertx:latest"

  cyberchef:
    host_group: app_cyberchef
    image: "ghcr.io/gchq/cyberchef:latest"
    port: 8071
    images:
      - "ghcr.io/gchq/cyberchef:latest"

  games-server:
    host_group: app_gamesserver
    images: []
    terraria:
      image: "ryshe/terraria:latest"
      port: 7777
      maxplayers: 8
      worldname: "TerrariaWorld"
      worldsize: 3
      difficulty: 0
      motd: "Welcome to the Terraria server!"
      language: "en-US"
      npcstream: 60
      seed: ""

  it-tools:
    host_group: app_ittools
    image: "corentinth/it-tools:latest"
    port: 8070
    images:
      - "corentinth/it-tools:latest"

  kasm:
    host_group: app_kasm
    image: "lscr.io/linuxserver/kasm:latest"
    port: 4443
    wizard_port: 3001
    images:
      - "lscr.io/linuxserver/kasm:latest"

  microbin:
    host_group: app_microbin
    image: "danielszabo99/microbin:latest"
    port: 8081
    hostname: "bin.wil.5am.cloud"
    images:
      - "danielszabo99/microbin:latest"

  openbooks:
    host_group: app_openbooks
    image: "evanbuss/openbooks:latest"
    port: 8072
    images:
      - "evanbuss/openbooks:latest"

  restreamer:
    host_group: app_restreamer
    image: "datarhei/restreamer:latest"
    port: 8710
    rtmp_port: 1935
    srt_port: 6000
    images:
      - "datarhei/restreamer:latest"

  romm:
    host_group: app_romm
    image: "rommapp/romm:latest"
    db_image: "mariadb:10.11"
    valkey_image: "valkey/valkey:latest"
    port: 8085
    images:
      - "rommapp/romm:latest"
      - "mariadb:10.11"
      - "valkey/valkey:latest"

  seafile:
    host_group: app_seafile
    nfs: true
    image: "seafileltd/seafile-mc:13.0-latest"
    db_image: "mariadb:10.11"
    redis_image: "redis:7"
    port: 8080
    hostname: "files.wil.5am.cloud"
    images:
      - "seafileltd/seafile-mc:13.0-latest"
      - "mariadb:10.11"
      - "redis:7"

  stirling-pdf:
    host_group: app_stirlingpdf
    image: "stirlingtools/stirling-pdf:latest"
    port: 8073
    images:
      - "stirlingtools/stirling-pdf:latest"

  website:
    host_group: app_website
    image: "ghcr.io/sfcal/samuel.computer:latest"
    port: 8090
    images:
      - "ghcr.io/sfcal/samuel.computer:latest"
