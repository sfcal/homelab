---
# DNS Server (BIND9) configuration

dns_forwarders:
  - "1.1.1.1"
  - "1.0.0.1"

dns_trusted_networks:
  - localhost
  - localnets
  - 10.2.0.0/16
  - 10.3.0.0/16
  - 100.64.0.0/10  # Tailscale CGNAT (cross-site forwarding)

# Zones forwarded to external DNS (not resolved locally)
dns_forward_zones:
  - "docs.5am.cloud"
  # Cross-site forwarding to LDN DNS
  - name: "ldn.5am.cloud"
    forwarders:
      - "10.3.20.53"

# Reverse Proxy IP (used for DNS A records of proxied services)
reverse_proxy_ip: "10.2.20.53"

# Reverse DNS zone name (derived from subnet)
dns_reverse_zone: "20.2.10.in-addr.arpa"

# Reverse Zone PTR Records
dns_ptr_records:
  - octet: "9"
    hostname: "ca.wil.5am.cloud."
  - octet: "53"
    hostname: "dns.wil.5am.cloud."
  - octet: "123"
    hostname: "time.wil.5am.cloud."
