---
# Monitoring Stack container configuration

# User/group IDs
monitoring_uid: "1000"
monitoring_gid: "1000"
monitoring_user: root
monitoring_group: root

# Container images
# renovate: datasource=docker
prometheus_image: "prom/prometheus:v3.10.0"
# renovate: datasource=docker
grafana_image: "grafana/grafana:12.4.1"
# renovate: datasource=docker
node_exporter_image: "prom/node-exporter:v1.10.2"
# renovate: datasource=docker
homepage_image: "ghcr.io/gethomepage/homepage:latest"
homepage_allowed_hosts: "homepage.ldn.5am.cloud"

# Directories to back up (relative to /opt)
backup_targets:
  - prometheus
  - grafana
  - homepage
