---
# DNS Server (BIND9) configuration

dns_forwarders:
  - "1.1.1.1"
  - "1.0.0.1"

dns_trusted_networks:
  - localhost
  - localnets
  - 10.3.0.0/16
  - 10.2.0.0/16
  - 100.64.0.0/10  # Tailscale CGNAT (cross-site forwarding)

# Secondary zones - replicated from remote primaries via AXFR
dns_secondary_zones:
  - name: "5am.video"
    masters:
      - "10.2.20.53"
  - name: "5am.cloud"
    masters:
      - "10.2.20.53"
  - name: "wil.5am.cloud"
    masters:
      - "10.2.20.53"
  - name: "ext.5am.cloud"
    masters:
      - "10.2.20.53"
  - name: "sfc.al"
    masters:
      - "10.2.20.53"

# IPs allowed to pull zone transfers from this server
dns_transfer_clients:
  - "10.2.20.53"
  - "100.64.0.0/10"
# IPs to notify on zone changes (must be specific IPs, not CIDRs)
dns_notify_targets:
  - "10.2.20.53"

# Reverse Proxy IP (used for DNS A records of proxied services)
reverse_proxy_ip: "10.3.20.53"

# Reverse DNS zone name (derived from subnet)
dns_reverse_zone: "20.3.10.in-addr.arpa"

# Reverse Zone PTR Records
dns_ptr_records:
  - octet: "9"
    hostname: "ca.ldn.5am.cloud."
  - octet: "53"
    hostname: "dns.ldn.5am.cloud."
  - octet: "123"
    hostname: "time.ldn.5am.cloud."
