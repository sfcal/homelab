---
# DNS Server (BIND9) configuration

dns_forwarders:
  - "1.1.1.1"
  - "1.0.0.1"

dns_trusted_networks:
  - localhost
  - localnets
  - 10.3.0.0/24
  - 10.2.0.0/16
  - 100.64.0.0/10  # Tailscale CGNAT (cross-site forwarding)

# Cross-site forwarding to WIL DNS
dns_forward_zones:
  - name: "5am.video"
    forwarders:
      - "10.2.20.53"
  - name: "5am.cloud"
    forwarders:
      - "10.2.20.53"
  - name: "wil.5am.cloud"
    forwarders:
      - "10.2.20.53"
  - name: "ext.5am.cloud"
    forwarders:
      - "10.2.20.53"
  - name: "sfc.al"
    forwarders:
      - "10.2.20.53"

# Reverse Proxy IP (used for DNS A records of proxied services)
reverse_proxy_ip: "10.3.0.53"

# Reverse DNS zone name (derived from subnet)
dns_reverse_zone: "0.3.10.in-addr.arpa"

# Reverse Zone PTR Records
dns_ptr_records:
  - octet: "9"
    hostname: "ca.ldn.5am.cloud."
  - octet: "53"
    hostname: "dns.ldn.5am.cloud."
  - octet: "123"
    hostname: "time.ldn.5am.cloud."
