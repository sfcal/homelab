---
# Unified Services List
# Shared between DNS (BIND9) and Reverse Proxy (Caddy) via [services:children] group
#
# Each service entry supports the following fields:
#   name          (required) - subdomain name
#   domain        (required) - domain this service belongs to
#   backend_host  (required) - IP of the backend service
#   backend_port  (required) - port of the backend service
#   proxied       (required) - true: routed through Caddy, DNS -> reverse_proxy_ip
#                              false: DNS -> backend_host directly, no Caddy entry
#   dns             (optional) - "external" skips A record generation (default: "internal")
#   enabled         (optional) - false skips both DNS and Caddy (default: true)
#   tls_skip_verify (optional) - true: backend uses HTTPS with self-signed cert
#   forward_headers (optional) - true: adds X-Real-IP, X-Forwarded-For, X-Forwarded-Proto
#   host_header     (optional) - "upstream": adds Host header override
#   encode          (optional) - encoding type, e.g. "gzip"
#   read_buffer     (optional) - transport read buffer size in bytes
services:
  # Monitoring services
  - name: grafana
    domain: ldn.5am.cloud
    backend_host: 10.3.0.30
    backend_port: 3000
    proxied: true
  - name: prometheus
    domain: ldn.5am.cloud
    backend_host: 10.3.0.30
    backend_port: 9090
    proxied: true
  - name: homepage
    domain: ldn.5am.cloud
    backend_host: 10.3.0.30
    backend_port: 3002
    proxied: true

  # Certificate Authority
  - name: ca
    domain: ldn.5am.cloud
    backend_host: 10.3.0.9
    backend_port: 9000
    proxied: true
    tls_skip_verify: true

  # Home Assistant
  - name: homeassistant
    domain: ldn.5am.cloud
    backend_host: 10.3.0.50
    backend_port: 8123
    proxied: true
    forward_headers: true

  # Haivision
  - name: hmg
    domain: ldn.5am.cloud
    backend_host: 10.3.0.111
    backend_port: 443
    proxied: false

  - name: kr
    domain: ldn.5am.cloud
    backend_host: 10.3.0.248
    backend_port: 443
    proxied: false


  # VM management
  - name: vm
    domain: ldn.5am.cloud
    backend_host: 10.3.0.10
    backend_port: 8006
    proxied: true
    tls_skip_verify: true
