---
- name: Deploy Networking (DNS, Reverse Proxy, Tailscale)
  hosts: infra_networking
  become: true

  handlers:
    - name: Include various service handlers.
      ansible.builtin.import_tasks: handlers/main.yml

  pre_tasks:
    - name: Include common prerequisites.
      ansible.builtin.include_role:
        name: common

  tasks:
    - name: Configure Tailscale.
      ansible.builtin.include_role:
        name: tailscale

    - name: Configure VPN clients.
      ansible.builtin.include_tasks: tasks/vpn_clients.yml
      when: vpn_clients | default([]) | length > 0

    - name: Configure BIND9.
      ansible.builtin.include_tasks: tasks/bind9.yml

    - name: Configure Cloudflare DDNS.
      ansible.builtin.include_tasks: tasks/ddns.yml

    - name: Configure Caddy.
      ansible.builtin.include_tasks: tasks/caddy.yml
