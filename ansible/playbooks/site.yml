---
# Deploy entire infrastructure in correct order
- name: Deploy Infrastructure Services
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display deployment order
      ansible.builtin.debug:
        msg:
          - "Deploying infrastructure in the following order:"
          - "1. Networking - DNS, Reverse Proxy, Tailscale (foundational)"
          - "2. Step-CA (required for TLS)"
          - "3. Time Server"
          - "4. Monitoring (depends on Step-CA)"

# --- Infrastructure ---

# 1. Networking (DNS, Reverse Proxy, Tailscale) - No dependencies
- import_playbook: infrastructure/networking/deploy.yml
  tags: ['networking', 'dns', 'ddns', 'caddy', 'foundation']

# 2. Step-CA - Must be second (needed by others)
- import_playbook: infrastructure/ca/deploy.yml
  tags: ['step-ca', 'foundation', 'security']

# 3. Time - Can run after foundation
- import_playbook: infrastructure/ntp/deploy.yml
  tags: ['time', 'ntp']

# 4. Monitoring - Depends on Step-CA
#- import_playbook: infrastructure/monitoring/deploy.yml
#  tags: ['monitoring', 'observability']

# --- Apps (custom playbooks) ---

# 5. Media - Depends on Step-CA
- import_playbook: apps/media/deploy.yml
  tags: ['media', 'applications']

# 6. Home Assistant
- import_playbook: apps/homeassistant/deploy.yml
  tags: ['homeassistant', 'applications']

# 7. Frigate NVR
- import_playbook: apps/frigate/deploy.yml
  tags: ['frigate', 'applications']

# 8. Cloud Gaming (Wolf & RomM)
- import_playbook: apps/cloud-gaming/deploy.yml
  tags: ['cloud-gaming', 'wolf', 'romm', 'applications']

# 9. Work Apps
- import_playbook: apps/work/deploy.yml
  tags: ['work', 'bookstack', 'convertx', 'cyberchef', 'it-tools', 'microbin', 'stirling-pdf', 'applications']

# --- Apps (data-driven) ---

- import_playbook: deploy-app.yml
  vars: { app_name: birdle }
  tags: ['birdle', 'applications']

- import_playbook: deploy-app.yml
  vars: { app_name: games-server }
  tags: ['games-server', 'applications']

- import_playbook: deploy-app.yml
  vars: { app_name: kasm }
  tags: ['kasm', 'applications']

- import_playbook: deploy-app.yml
  vars: { app_name: openbooks }
  tags: ['openbooks', 'applications']

- import_playbook: deploy-app.yml
  vars: { app_name: restreamer }
  tags: ['restreamer', 'applications']

- import_playbook: deploy-app.yml
  vars: { app_name: seafile }
  tags: ['seafile', 'applications']

- import_playbook: deploy-app.yml
  vars: { app_name: subsearch }
  tags: ['subsearch', 'applications']

- import_playbook: deploy-app.yml
  vars: { app_name: website }
  tags: ['website', 'applications']
