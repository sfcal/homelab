---
# Deploy entire infrastructure in correct order
- name: Deploy Infrastructure Services
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display deployment order
      ansible.builtin.debug:
        msg:
          - "Deploying infrastructure in the following order:"
          - "1. Networking - DNS, Reverse Proxy, Tailscale (foundational)"
          - "2. Step-CA (required for TLS)"
          - "3. Time Server"
          - "4. PXE Server"
          - "5. Media Stack (depends on Step-CA)"
          - "6. Monitoring (depends on Step-CA)"

# --- Infrastructure ---

# 1. Networking (DNS, Reverse Proxy, Tailscale) - No dependencies
- import_playbook: infrastructure/networking/deploy.yml
  tags: ['networking', 'dns', 'ddns', 'caddy', 'foundation']

# 2. Step-CA - Must be second (needed by others)
- import_playbook: infrastructure/ca/deploy.yml
  tags: ['step-ca', 'foundation', 'security']

# 3. Time - Can run after foundation
- import_playbook: infrastructure/ntp/deploy.yml
  tags: ['time', 'ntp']

# 4. PXE - Independent
- import_playbook: infrastructure/pxe/deploy.yml
  tags: ['pxe', 'netboot']

# 5. Monitoring - Depends on Step-CA
#- import_playbook: infrastructure/monitoring/deploy.yml
#  tags: ['monitoring', 'observability']

# --- Apps ---

# 6. Media - Depends on Step-CA
- import_playbook: apps/media/deploy.yml
  tags: ['media', 'applications']

# 7. Games Server - Independent
- import_playbook: apps/games-server/deploy.yml
  tags: ['games', 'terraria']

# 8. Personal Website - Independent
- import_playbook: apps/website/deploy.yml
  tags: ['website']

# 9. Birdle - Independent
- import_playbook: apps/birdle/deploy.yml
  tags: ['birdle']

# 10. ConvertX - Independent
- import_playbook: apps/convertx/deploy.yml
  tags: ['convertx']

# 11. Restreamer - Independent
- import_playbook: apps/restreamer/deploy.yml
  tags: ['restreamer']

# 12. Home Assistant - Independent
- import_playbook: apps/homeassistant/deploy.yml
  tags: ['homeassistant']

# 13. IT-Tools - Independent
- import_playbook: apps/it-tools/deploy.yml
  tags: ['it-tools']

# 14. BookStack - Independent
- import_playbook: apps/bookstack/deploy.yml
  tags: ['bookstack']

# 15. CyberChef - Independent
- import_playbook: apps/cyberchef/deploy.yml
  tags: ['cyberchef']

# 16. OpenBooks - Independent
- import_playbook: apps/openbooks/deploy.yml
  tags: ['openbooks']

# 17. Stirling-PDF - Independent
- import_playbook: apps/stirling-pdf/deploy.yml
  tags: ['stirling-pdf']

# 18. Kasm Workspaces - Independent
- import_playbook: apps/kasm/deploy.yml
  tags: ['kasm']

# 19. Seafile - Independent
- import_playbook: apps/seafile/deploy.yml
  tags: ['seafile', 'applications']

# 20. MicroBin - Independent
- import_playbook: apps/microbin/deploy.yml
  tags: ['microbin', 'applications']

# 21. RomM - Independent
- import_playbook: apps/romm/deploy.yml
  tags: ['romm', 'applications']
