---
- name: Deploy MicroBin
  hosts: app_microbin
  become: true

  pre_tasks:
    - name: Include common prerequisites.
      ansible.builtin.include_role:
        name: common

  roles:
    - role: docker_service
      vars:
        service_name: microbin
        service_compose_template: "{{ playbook_dir }}/templates/compose.yaml.j2"
        service_user: "{{ microbin_user }}"
        service_group: "{{ microbin_group }}"
        service_images:
          - "{{ microbin_image }}"
