---
- name: Deploy Home Assistant
  hosts: app_homeassistant
  become: true

  pre_tasks:
    - name: Include common prerequisites.
      ansible.builtin.include_role:
        name: common

  tasks:
    - name: Deploy Home Assistant via docker_service role.
      ansible.builtin.include_role:
        name: docker_service
      vars:
        service_name: homeassistant
        service_compose_template: "{{ playbook_dir }}/templates/compose.yaml.j2"
        service_user: "{{ homeassistant_user }}"
        service_group: "{{ homeassistant_group }}"
        service_images:
          - "{{ homeassistant_image }}"

    - name: Ensure Home Assistant config directory exists.
      ansible.builtin.file:
        path: "{{ deploy_path }}/homeassistant/config"
        state: directory
        owner: "{{ homeassistant_user }}"
        group: "{{ homeassistant_group }}"
        mode: "0755"

    - name: Deploy Home Assistant configuration for reverse proxy.
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/configuration.yaml.j2"
        dest: "{{ deploy_path }}/homeassistant/config/configuration.yaml"
        owner: "{{ homeassistant_user }}"
        group: "{{ homeassistant_group }}"
        mode: "0644"
      notify: Restart homeassistant
