# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json

site_name: Homelab Infrastructure as Code
site_url: https://docs.5am.cloud/homelab/
site_dir: site/homelab
site_description: Infrastructure-as-code homelab on Proxmox with Packer, Terraform, Ansible, and Docker.
copyright: Copyright &copy; 2025-2026 sfcal

repo_url: https://github.com/sfcal/homelab
repo_name: sfcal/homelab

theme:
  name: material
  favicon: assets/images/favicon.png
  custom_dir: docs/.overrides
  features:
    - navigation.path
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.tracking
    - navigation.footer
    - navigation.top
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - toc.follow
    - search.highlight
    - search.share
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: homelab-light
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: homelab-dark
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - toc:
      anchorlink: true
      anchorlink_class: toclink
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sfcal/homelab

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Quick Start: getting-started/quick-start.md
  - Concepts:
    - concepts/index.md
    - Architecture: concepts/architecture.md
    - Environments: concepts/environments.md
    - Networking: concepts/networking.md
    - Secrets: concepts/secrets.md
  - Guides:
    - guides/index.md
    - Deploy a Service: guides/deploy-service.md
    - Add a New VM: guides/add-vm.md
    - Networking Changes: guides/networking-changes.md
    - Certificates: guides/certificates.md
  - Reference:
    - reference/index.md
    - Terraform: reference/terraform.md
    - Ansible: reference/ansible.md
    - Packer: reference/packer.md
    - Task Commands: reference/tasks.md
    - Config Reference: reference/config.md
  - Infrastructure:
    - infrastructure/index.md
    - Networking:
      - infrastructure/networking/index.md
      - DNS (BIND9): infrastructure/networking/dns.md
      - Reverse Proxy (Caddy): infrastructure/networking/proxy.md
      - Tailscale: infrastructure/networking/tailscale.md
      - UniFi Gateway: infrastructure/networking/unifi.md
    - Certificate Authority: infrastructure/ca/index.md
    - Time Server: infrastructure/ntp/index.md
    - Monitoring: infrastructure/monitoring/index.md
    - Docker Services: infrastructure/docker.md

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
