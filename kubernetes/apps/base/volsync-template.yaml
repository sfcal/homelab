# Template for app volsync backups
# Replace: APP_NAME, APP_NAMESPACE, PVC_NAME
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: APP_NAME-restic-secret
  namespace: APP_NAMESPACE
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  refreshInterval: 1h
  target:
    name: APP_NAME-restic-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        RESTIC_REPOSITORY: "/backups/APP_NAME"
        RESTIC_PASSWORD: "{{ .resticPassword }}"
  dataFrom:
    - extract:
        key: volsync-restic
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: APP_NAME
  namespace: APP_NAMESPACE
spec:
  sourcePVC: PVC_NAME
  trigger:
    schedule: "0 3 * * *"
  restic:
    repository: APP_NAME-restic-secret
    retain:
      daily: 7
      weekly: 4
      monthly: 3
    copyMethod: Snapshot
    volumeSnapshotClassName: csi-ceph-blockpool
    moverSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000