apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: volsync
  namespace: volsync-system
spec:
  interval: 1h
  chart:
    spec:
      chart: volsync
      version: "0.10.0"
      sourceRef:
        kind: HelmRepository
        name: backube
        namespace: flux-system
  dependsOn:
    - name: snapshot-controller
      namespace: snapshot-controller
  values:
    manageCRDs: true
    metrics:
      disableAuth: true