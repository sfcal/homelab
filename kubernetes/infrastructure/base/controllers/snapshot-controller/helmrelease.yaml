apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: snapshot-controller
  namespace: snapshot-controller
spec:
  interval: 30m
  chart:
    spec:
      chart: snapshot-controller
      version: "3.0.5"
      sourceRef:
        kind: HelmRepository
        name: piraeus
        namespace: flux-system
  values:
    controller:
      replicaCount: 2
    webhook:
      enabled: false