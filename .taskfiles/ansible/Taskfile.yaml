version: '3'

vars:
  ENV_DIR: 'environments/{{.ENV}}'
  HOSTS_FILE: '{{.ENV_DIR}}/hosts.ini'
  APPS_FILE: '{{.ENV_DIR}}/group_vars/all/apps.yml'

tasks:
  # --- Internal Tasks ---

  _deploy:
    internal: true
    dir: '{{.ROOT_DIR}}/ansible'
    cmds:
      - ansible-playbook -i {{.HOSTS_FILE}} playbooks/{{.PLAYBOOK_PATH}} {{.EXTRA_ARGS | default ""}}

  # --- Media Operations ---

  restore-media:
    desc: Restore media stack backup
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/media/restore.yml }

  backup-media:
    desc: backup media stack
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/media/backup.yml }

  # --- Full Deployment ---

  deploy-all:
    desc: Deploy entire infrastructure in correct order
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: site.yml, EXTRA_ARGS: '-e @{{.APPS_FILE}}' }

  # --- Infrastructure ---

  deploy-networking:
    desc: Deploy networking stack (DNS, reverse proxy, Tailscale)
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: infrastructure/networking/deploy.yml }

  deploy-external-monitoring:
    desc: Deploy external monitoring server
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: infrastructure/external-monitoring/deploy.yml }

  deploy-monitoring:
    desc: Deploy monitoring stack
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: infrastructure/monitoring/deploy.yml }

  deploy-ca:
    desc: Deploy Step-CA certificate authority
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: infrastructure/ca/deploy.yml }

  deploy-ntp:
    desc: Deploy NTP time server (Chrony)
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: infrastructure/ntp/deploy.yml }

  # --- Applications ---

  deploy-app:
    desc: "Deploy an app by name (APP=<name>)"
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: deploy-app.yml, EXTRA_ARGS: '-e app_name={{.APP}} -e @{{.APPS_FILE}}' }

  deploy-media:
    desc: Deploy media stack
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/media/deploy.yml }

  deploy-homeassistant:
    desc: Deploy Home Assistant
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/homeassistant/deploy.yml }

  # --- Utility Tasks ---

  ping:
    desc: Ping all hosts in inventory
    dir: '{{.ROOT_DIR}}/ansible'
    cmds:
      - ansible -i {{.HOSTS_FILE}} all -m ping
