version: '3'

vars:
  ENV_DIR: 'environments/{{.ENV}}'
  HOSTS_FILE: '{{.ENV_DIR}}/hosts.ini'

tasks:
  # --- Internal Tasks ---

  _deploy:
    internal: true
    dir: '{{.ROOT_DIR}}/ansible'
    cmds:
      - ansible-playbook -i {{.HOSTS_FILE}} playbooks/{{.PLAYBOOK_PATH}}

  # --- Media Operations ---

  restore-media:
    desc: Restore media stack backup
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/media/restore.yml }

  backup-media:
    desc: backup media stack
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/media/backup.yml }

  # --- Full Deployment ---

  deploy-all:
    desc: Deploy entire infrastructure in correct order
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: site.yml }

  # --- Infrastructure ---

  deploy-networking:
    desc: Deploy networking stack (DNS, reverse proxy, Tailscale)
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: infrastructure/networking/deploy.yml }

  deploy-external-monitoring:
    desc: Deploy external monitoring server
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: infrastructure/external-monitoring/deploy.yml }

  deploy-monitoring:
    desc: Deploy monitoring stack
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: infrastructure/monitoring/deploy.yml }

  deploy-ca:
    desc: Deploy Step-CA certificate authority
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: infrastructure/ca/deploy.yml }

  deploy-ntp:
    desc: Deploy NTP time server (Chrony)
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: infrastructure/ntp/deploy.yml }

  # --- Applications ---

  deploy-media:
    desc: Deploy media stack
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/media/deploy.yml }

  deploy-games:
    desc: Deploy games server (tModLoader Terraria)
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/games-server/deploy.yml }

  deploy-website:
    desc: Deploy personal website
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/website/deploy.yml }

  deploy-birdle:
    desc: Deploy birdle game
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/birdle/deploy.yml }

  deploy-convertx:
    desc: Deploy ConvertX file converter
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/convertx/deploy.yml }

  deploy-restreamer:
    desc: Deploy Restreamer video streaming server
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/restreamer/deploy.yml }

  deploy-homeassistant:
    desc: Deploy Home Assistant
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/homeassistant/deploy.yml }

  deploy-ittools:
    desc: Deploy IT-Tools developer utilities
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/it-tools/deploy.yml }

  deploy-bookstack:
    desc: Deploy BookStack documentation wiki
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/bookstack/deploy.yml }

  deploy-cyberchef:
    desc: Deploy CyberChef data analysis tool
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/cyberchef/deploy.yml }

  deploy-openbooks:
    desc: Deploy OpenBooks ebook downloader
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/openbooks/deploy.yml }

  deploy-stirlingpdf:
    desc: Deploy Stirling-PDF tools
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/stirling-pdf/deploy.yml }

  deploy-kasm:
    desc: Deploy Kasm Workspaces
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/kasm/deploy.yml }

  deploy-seafile:
    desc: Deploy Seafile file sync & share
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/seafile/deploy.yml }

  deploy-romm:
    desc: Deploy RomM game library manager
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/romm/deploy.yml }

  deploy-microbin:
    desc: Deploy MicroBin paste bin
    cmds:
      - task: _deploy
        vars: { PLAYBOOK_PATH: apps/microbin/deploy.yml }

  # --- Utility Tasks ---

  ping:
    desc: Ping all hosts in inventory
    dir: '{{.ROOT_DIR}}/ansible'
    cmds:
      - ansible -i {{.HOSTS_FILE}} all -m ping
